services:
  app:
    build: .
    container_name: she_said_no_api
    expose:
      - "3000"
    networks:
      - web
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=web
      - traefik.http.routers.she-said-no.rule=Host(`ssnaas.eliasdevstudio.tech`)
      - traefik.http.routers.she-said-no.entrypoints=websecure
      - traefik.http.routers.she-said-no.tls=true
      - traefik.http.routers.she-said-no.tls.certresolver=letsencrypt
      - traefik.http.services.she-said-no.loadbalancer.server.port=3000

networks:
  web:
    driver: bridge
    external: true